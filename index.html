<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>明‘s life</title>
    <meta name="theme-color" content="#176b64" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/app-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/app-icon.png" />
    <link rel="stylesheet" href="styles.css?v=delete1" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <button class="icon-button ghost" id="backButton" type="button" aria-label="기록으로 돌아가기" title="기록">
          ‹
        </button>
        <div class="brand-block">
          <h1><span>combark</span>'s day</h1>
          <p id="dailyQuote" class="daily-quote"></p>
        </div>
        <button class="icon-button" id="newEntryButton" type="button" aria-label="새 일기 쓰기" title="새 일기">
          +
        </button>
      </header>

      <section id="recordsView" class="view" aria-label="기록">
        <div class="section-heading">
          <h2 class="trail-heading">나의 발자취</h2>
          <span id="entryCount">0개</span>
        </div>
        <div id="entryList" class="entry-list" aria-live="polite"></div>
      </section>

      <section id="calendarView" class="view hidden" aria-label="달력">
        <div class="section-heading">
          <h2 id="calendarTitle">달력</h2>
          <span id="todayClock"></span>
        </div>
        <div class="calendar-card">
          <div class="calendar-controls">
            <button id="prevMonthButton" class="mini-button" type="button" aria-label="이전 달">‹</button>
            <strong id="calendarMonth"></strong>
            <button id="nextMonthButton" class="mini-button" type="button" aria-label="다음 달">›</button>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
      </section>

      <section id="statsView" class="view hidden" aria-label="통계">
        <div class="section-heading">
          <h2>통계</h2>
          <span id="statsRange">전체</span>
        </div>
        <div id="statsGrid" class="stats-grid"></div>
        <div class="panel-block">
          <h2>기분 분포</h2>
          <div id="moodStats" class="mood-stats"></div>
        </div>
      </section>

      <section id="settingsView" class="view hidden" aria-label="설정">
        <div class="section-heading">
          <h2>설정</h2>
          <span id="settingsStatus">저장됨</span>
        </div>
        <div class="settings-list">
          <section class="setting-card">
            <h2>일기백업파일지정</h2>
            <p>현재 일기 전체를 백업 파일로 저장합니다.</p>
            <button id="backupButton" class="text-button primary" type="button">백업 파일 만들기</button>
          </section>
          <section class="setting-card">
            <h2>백업파일불러오기</h2>
            <p>이 앱에서 만든 백업 파일을 불러옵니다.</p>
            <label class="text-button" for="restoreInput">백업 파일 선택</label>
            <input id="restoreInput" type="file" accept="application/json,.json" hidden />
          </section>
          <section class="setting-card">
            <h2>비밀번호설정</h2>
            <p>앱을 열 때 사용할 비밀번호를 설정합니다.</p>
            <input id="passwordInput" type="password" autocomplete="new-password" placeholder="새 비밀번호" />
            <div class="setting-actions">
              <button id="setPasswordButton" class="text-button primary" type="button">설정</button>
              <button id="clearPasswordButton" class="text-button danger" type="button">해제</button>
            </div>
          </section>
        </div>
      </section>

      <section id="editorView" class="view hidden" aria-label="일기 작성">
        <section class="editor">
          <div class="date-row">
            <input id="entryDate" type="date" aria-label="날짜" />
            <select id="entryMood" aria-label="오늘의 기분">
              <option value="calm">행복</option>
              <option value="happy">감사</option>
              <option value="tired">평온</option>
              <option value="sad">우울</option>
              <option value="proud">화남</option>
            </select>
          </div>
          <input id="entryTitle" class="title-input" type="text" placeholder="오늘의 제목" maxlength="40" />
          <textarea id="entryBody" placeholder="오늘 기억하고 싶은 장면을 적어보세요."></textarea>

          <div class="photo-panel" aria-label="사진 첨부">
            <div class="photo-panel-head">
              <div>
                <h2>사진 첨부</h2>
                <p id="photoCount">0 / 10</p>
              </div>
              <label class="text-button upload-button" for="photoInput">추가</label>
              <input id="photoInput" type="file" accept="image/*" multiple hidden />
            </div>
            <div id="photoGrid" class="photo-grid"></div>
          </div>

          <div class="action-row">
            <p id="saveStatus" class="save-status">자동 저장 준비됨</p>
            <button id="voiceButton" class="round-button" type="button" aria-label="음성 입력" title="음성 입력">🎙</button>
            <button id="deleteButton" class="text-button danger" type="button">삭제</button>
            <button id="saveButton" class="text-button primary" type="button">저장</button>
          </div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="주요 메뉴">
      <button class="nav-button active home" type="button" data-view="records" aria-label="홈">
        <span>⌂</span><strong>홈</strong>
      </button>
      <button class="nav-button calendar" type="button" data-view="calendar" aria-label="달력">
        <span>▦</span><strong>달력</strong>
      </button>
      <button class="nav-button stats" type="button" data-view="stats" aria-label="통계">
        <span>◔</span><strong>통계</strong>
      </button>
      <button class="nav-button settings" type="button" data-view="settings" aria-label="설정">
        <span>⚙</span><strong>설정</strong>
      </button>
    </nav>

    <div id="lockScreen" class="lock-screen hidden" role="dialog" aria-modal="true" aria-label="비밀번호 입력">
      <div class="lock-panel">
        <h2>비밀번호</h2>
        <input id="unlockInput" type="password" autocomplete="current-password" placeholder="비밀번호 입력" />
        <button id="unlockButton" class="text-button primary" type="button">열기</button>
        <p id="unlockStatus"></p>
      </div>
    </div>

    <script src="app.js?v=voicefix2"></script>
  </body>
</html>
